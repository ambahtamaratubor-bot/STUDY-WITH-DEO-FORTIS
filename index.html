function App() {
  const [page, setPage] = useState('landing');
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) { setUser(session.user); fetchProfile(session.user.id); }
    });
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session) { setUser(session.user); fetchProfile(session.user.id); }
      else { setUser(null); setProfile(null); setPage('landing'); }
    });
  }, []);

  async function fetchProfile(userId) {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if (data) {
      setProfile(data);
      if (data.status === 'approved') setPage('dashboard');
      else setPage('pending');
    }
  }

  if (page === 'landing') return <Landing setPage={setPage} />;
  if (page === 'signup') return <Signup setPage={setPage} />;
  if (page === 'login') return <Login setPage={setPage} fetchProfile={fetchProfile} />;
  if (page === 'pending') return <Pending />;
  if (page === 'dashboard') return <Dashboard user={user} profile={profile} setPage={setPage} />;
  if (page === 'study') return <Study user={user} profile={profile} setPage={setPage} />;
  if (page === 'flashcards') return <Flashcards user={user} setPage={setPage} />;
  if (page === 'vignette') return <Vignette user={user} setPage={setPage} />;
  if (page === 'leaderboard') return <Leaderboard user={user} setPage={setPage} />;
  if (page === 'admin') return <Admin setPage={setPage} />;
  return <Landing setPage={setPage} />;
}

function Dashboard({ user, profile, setPage }) {
  const [sessions, setSessions] = useState([]);
  const [clockedIn, setClockedIn] = useState(false);
  const [currentSession, setCurrentSession] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const intervalRef = useRef(null);

  useEffect(() => { fetchSessions(); return () => clearInterval(intervalRef.current); }, []);
  useEffect(() => {
    if (clockedIn) { intervalRef.current = setInterval(() => setElapsed(e => e+1), 1000); }
    else { clearInterval(intervalRef.current); }
    return () => clearInterval(intervalRef.current);
  }, [clockedIn]);

  async function fetchSessions() {
    const { data } = await supabase.from('study_sessions').select('*').eq('user_id',user.id).order('started_at',{ascending:false}).limit(5);
    if (data) setSessions(data);
  }
  async function clockIn() {
    const { data } = await supabase.from('study_sessions').insert({ user_id:user.id, topic:'General Study' }).select().single();
    if (data) { setCurrentSession(data); setClockedIn(true); setElapsed(0); }
  }
  async function clockOut() {
    if (!currentSession) return;
    const mins = Math.floor(elapsed/60);
    await supabase.from('study_sessions').update({ ended_at:new Date().toISOString(), duration_minutes:mins }).eq('id',currentSession.id);
    await supabase.from('profiles').update({ total_study_minutes:(profile.total_study_minutes||0)+mins }).eq('id',user.id);
    setClockedIn(false); setCurrentSession(null); setElapsed(0); fetchSessions();
  }

  const totalHours = Math.floor((profile?.total_study_minutes||0)/60);
  const totalMins = (profile?.total_study_minutes||0)%60;

function Study({ user, profile, setPage }) {
  const [step, setStep] = useState('setup');
  const [config, setConfig] = useState({ topic:'', workMins:25, breakMins:5, sessions:4, useRecall:false, recallStyle:'', recallDetails:'' });
  const [timer, setTimer] = useState(0);
  const [running, setRunning] = useState(false);
  const [currentSession, setCurrentSession] = useState(1);
  const [isBreak, setIsBreak] = useState(false);
  const [requestSent, setRequestSent] = useState(false);
  const intervalRef = useRef(null);

  const workTime = config.workMins*60;
  const breakTime = config.breakMins*60;
  const maxTime = isBreak ? breakTime : workTime;

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimer(t => {
          if (t >= maxTime-1) {
            if (isBreak) { setIsBreak(false); setCurrentSession(s => s+1); return 0; }
            else { setIsBreak(true); return 0; }
          }
          return t+1;
        });
      }, 1000);
    } else { clearInterval(intervalRef.current); }
    return () => clearInterval(intervalRef.current);
  }, [running, isBreak, maxTime]);

  async function sendRecallRequest() {
    await supabase.from('recall_requests').insert({ user_id:user.id, user_name:profile?.full_name, user_email:profile?.email, topic:config.topic, style:config.recallStyle, details:config.recallDetails, status:'pending' });
    setRequestSent(true);
  }

  const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  const progress = timer/maxTime;
  const r = 80; const circ = 2*Math.PI*r;

  if (step==='setup') return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <style>{css}</style>
      <div className="card fade" style={{ width:'100%', maxWidth:540 }}>
        <button onClick={() => setPage('dashboard')} style={{ background:'none', border:'none', color:S.dim, cursor:'pointer', fontSize:12, fontFamily:S.mono, letterSpacing:1, marginBottom:16 }}>← Back</button>
        <span className="chapter">Study Setup</span>
        <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:26, marginBottom:24 }}>Configure Your Session</h2>
        <div style={{ marginBottom:20 }}>
          <label className="label">What topic are you studying?</label>
          <input className="input" placeholder="e.g. Bacteriology, Cardiology" value={config.topic} onChange={e => setConfig({...config,topic:e.target.value})} />
        </div>
        <div style={{ marginBottom:20 }}>
          <label className="label">Pomodoro Configuration</label>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
            <div><label className="label" style={{ fontSize:9 }}>Work (mins)</label><input className="input" type="number" min="1" max="120" value={config.workMins} onChange={e => setConfig({...config,workMins:parseInt(e.target.value)||25})} /></div>
            <div><label className="label" style={{ fontSize:9 }}>Break (mins)</label><input className="input" type="number" min="1" max="60" value={config.breakMins} onChange={e => setConfig({...config,breakMins:parseInt(e.target.value)||5})} /></div>
            <div><label className="label" style={{ fontSize:9 }}>Sessions</label><input className="input" type="number" min="1" max="20" value={config.sessions} onChange={e => setConfig({...config,sessions:parseInt(e.target.value)||4})} /></div>
          </div>
          <p style={{ fontFamily:S.mono, fontSize:10, color:S.dim, marginTop:8, letterSpacing:1 }}>Total: {config.workMins*config.sessions} mins study + {config.breakMins*(config.sessions-1)} mins break</p>
        </div>
        <div style={{ marginBottom:20 }}>
          <label className="label">Request Active Recall?</label>
          <div style={{ display:'flex', gap:12 }}>
            {[true,false].map(v => (
              <button key={String(v)} onClick={() => setConfig({...config,useRecall:v})} className="btn" style={{ flex:1, background:config.useRecall===v?S.gold:'transparent', color:config.useRecall===v?'#0F0E0A':S.muted, border:`1px solid ${config.useRecall===v?S.gold:S.border}` }}>{v ? 'Yes' : 'No'}</button>
            ))}
          </div>
        </div>
        {config.useRecall && (
          <>
            <div style={{ marginBottom:20 }}>
              <label className="label">Recall Style</label>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
                {[['flashcard','🃏 Flashcard'],['vignette','📝 Vignette'],['theory','📖 Theory']].map(([v,l]) => (
                  <button key={v} onClick={() => setConfig({...config,recallStyle:v})} className="btn" style={{ background:config.recallStyle===v?S.gold:'transparent', color:config.recallStyle===v?'#0F0E0A':S.muted, border:`1px solid ${config.recallStyle===v?S.gold:S.border}`, fontSize:11 }}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:20 }}>
              <label className="label">Be Specific (optional)</label>
              <textarea className="input" placeholder="e.g. Focus on gram positive bacteria, NBME style, first 40 cards..." value={config.recallDetails} onChange={e => setConfig({...config,recallDetails:e.target.value})} style={{ minHeight:80, resize:'vertical' }} />
            </div>
            {requestSent ? (
              <div style={{ background:'#0a1f18', border:`1px solid ${S.teal}`, borderRadius:2, padding:'12px 16px', marginBottom:20, fontSize:13, color:S.teal }}>✓ Request sent! You'll be notified when your content is ready.</div>
            ) : (
              <button className="btn btn-teal" style={{ width:'100%', marginBottom:20 }} onClick={sendRecallRequest} disabled={!config.recallStyle}>Send Recall Request →</button>
            )}
          </>
        )}
        <button className="btn btn-gold" style={{ width:'100%' }} onClick={() => { setStep('studying'); setRunning(true); }} disabled={!config.topic}>Start Session →</button>
      </div>
    </div>
  );

  return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <style>{css}</style>
      <div className="card fade" style={{ textAlign:'center', maxWidth:400, width:'100%' }}>
        <span className="chapter">{isBreak ? '☕ Break Time' : `Session ${currentSession} of ${config.sessions}`}</span>
        <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:20, marginBottom:8, color:isBreak?S.teal:S.text }}>{config.topic}</h2>
        <div style={{ position:'relative', width:200, height:200, margin:'24px auto' }}>
          <svg width="200" height="200" style={{ transform:'rotate(-90deg)' }}>
            <circle cx="100" cy="100" r={r} fill="none" stroke={S.border} strokeWidth="6" />
            <circle cx="100" cy="100" r={r} fill="none" stroke={isBreak?S.teal:S.gold} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ*(1-progress)} strokeLinecap="round" className="timer-circle" />
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
            <div style={{ fontFamily:S.mono, fontSize:32, color:isBreak?S.teal:S.gold }}>{fmt(maxTime-timer)}</div>
            <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, letterSpacing:2, marginTop:4 }}>{isBreak?'BREAK':'FOCUS'}</div>
          </div>
        </div>
        <div style={{ display:'flex', gap:12, justifyContent:'center', marginBottom:16 }}>
          <button className="btn btn-gold" onClick={() => setRunning(r => !r)}>{running ? 'Pause' : 'Resume'}</button>
          <button className="btn btn-outline" onClick={() => setPage('dashboard')}>End</button>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          <button className="btn btn-outline" style={{ fontSize:11 }} onClick={() => setPage('flashcards')}>🃏 Flashcards</button>
          <button className="btn btn-outline" style={{ fontSize:11 }} onClick={() => setPage('vignette')}>📝 Q-Bank</button>
        </div>
      </div>
    </div>
  );
}

function Flashcards({ user, setPage }) {
  const [decks, setDecks] = useState([]);
  const [selectedDeck, setSelectedDeck] = useState(null);
  const [cards, setCards] = useState([]);
  const [queue, setQueue] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [progress, setProgress] = useState({ easy:0, iffy:0, hard:0 });
  const [done, setDone] = useState(false);
  const [view, setView] = useState('decks');

  useEffect(() => { supabase.from('flashcard_decks').select('*').order('created_at',{ascending:false}).then(({ data }) => { if (data) setDecks(data); }); }, []);

  async function loadCards(deck) {
    setSelectedDeck(deck);
    const { data } = await supabase.from('flashcards').select('*').eq('deck_id',deck.id);
    if (data && data.length>0) { setCards(data); setQueue([...data]); setCurrentIdx(0); setFlipped(false); setProgress({easy:0,iffy:0,hard:0}); setDone(false); setView('studying'); }
  }

  function markCard(difficulty) {
    const current = queue[currentIdx];
    setProgress(p => ({...p,[difficulty]:p[difficulty]+1}));
    let newQueue = [...queue];
    if (difficulty==='hard') newQueue.splice(currentIdx+2, 0, current);
    else if (difficulty==='iffy') newQueue.push(current);
    newQueue.splice(currentIdx, 1);
    if (newQueue.length===0) { setDone(true); return; }
    setQueue(newQueue);
    setCurrentIdx(Math.min(currentIdx, newQueue.length-1));
    setFlipped(false);
  }

  const pct = cards.length>0 ? Math.round((progress.easy/cards.length)*100) : 0;

  if (view==='decks') return (
    <div style={{ background:S.bg, minHeight:'100vh' }}>
      <style>{css}</style>
      <nav style={{ background:'rgba(15,14,10,0.97)', borderBottom:`1px solid ${S.border}`, padding:'16px 48px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ fontFamily:"'Playfair Display',serif", fontStyle:'italic', fontSize:20, color:S.gold }}>Deo Fortis</div>
        <button className="btn btn-outline" style={{ padding:'8px 16px' }} onClick={() => setPage('dashboard')}>← Dashboard</button>
      </nav>
      <div style={{ maxWidth:800, margin:'0 auto', padding:'48px 24px' }}>
        <span className="chapter">Flashcard Decks</span>
        <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:40, fontWeight:700, marginBottom:8 }}>Study <em style={{ fontStyle:'italic', color:S.gold }}>Flashcards</em></h1>
        <p style={{ fontSize:14, color:S.muted, marginBottom:40, fontWeight:300 }}>Select a deck. Mark cards Easy, Iffy, or Hard as you go.</p>
        {decks.length===0 ? (
          <div className="card" style={{ textAlign:'center', padding:48 }}><div style={{ fontSize:40, marginBottom:16 }}>🃏</div><p style={{ fontSize:14, color:S.dim }}>No flashcard decks yet. Check back soon!</p></div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))', gap:16 }}>
            {decks.map((deck,i) => (
              <div key={i} className="card" style={{ cursor:'pointer' }} onClick={() => loadCards(deck)}>
                <div style={{ fontSize:32, marginBottom:12 }}>🃏</div>
                <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:18, color:S.text, marginBottom:8 }}>{deck.topic}</h3>
                <button className="btn btn-gold" style={{ width:'100%', marginTop:16 }}>Start Deck →</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  if (done) return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <style>{css}</style>
      <div className="card fade" style={{ maxWidth:440, width:'100%', textAlign:'center' }}>
        <div style={{ fontSize:48, marginBottom:16 }}>🎉</div>
        <span className="chapter">Deck Complete</span>
        <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:28, marginBottom:20 }}>{selectedDeck?.topic}</h2>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:24 }}>
          {[{label:'Easy',val:progress.easy,color:S.teal},{label:'Iffy',val:progress.iffy,color:S.gold},{label:'Hard',val:progress.hard,color:'#ff8888'}].map((s,i) => (
            <div key={i} className="card" style={{ padding:16, textAlign:'center' }}>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28, color:s.color }}>{s.val}</div>
              <div style={{ fontFamily:S.mono, fontSize:9, color:S.dim, letterSpacing:1, textTransform:'uppercase' }}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{ display:'grid', gap:10 }}>
          <button className="btn btn-gold" onClick={() => { setQueue([...cards]); setCurrentIdx(0); setFlipped(false); setProgress({easy:0,iffy:0,hard:0}); setDone(false); }}>Redo All Cards</button>
          <button className="btn btn-outline" onClick={() => setView('decks')}>Back to Decks</button>
          <button className="btn btn-outline" onClick={() => setPage('dashboard')}>Dashboard</button>
        </div>
      </div>
    </div>
  );

  const card = queue[currentIdx];
  if (!card) return null;

  return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24, flexDirection:'column' }}>
      <style>{css}</style>
      <div style={{ width:'100%', maxWidth:560 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <button onClick={() => setView('decks')} style={{ background:'none', border:'none', color:S.dim, cursor:'pointer', fontSize:12, fontFamily:S.mono, letterSpacing:1 }}>← Decks</button>
          <span style={{ fontFamily:S.mono, fontSize:11, color:S.muted }}>{selectedDeck?.topic}</span>
          <span style={{ fontFamily:S.mono, fontSize:11, color:S.dim }}>{currentIdx+1} / {queue.length}</span>
        </div>
        <div style={{ marginBottom:16 }}>
          <div className="progress-bar"><div className="progress-fill" style={{ width:`${pct}%`, background:S.teal }} /></div>
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:8 }}>
            <span style={{ fontFamily:S.mono, fontSize:10, color:S.teal }}>✓ {progress.easy} easy</span>
            <span style={{ fontFamily:S.mono, fontSize:10, color:S.gold }}>~ {progress.iffy} iffy</span>
            <span style={{ fontFamily:S.mono, fontSize:10, color:'#ff8888' }}>✗ {progress.hard} hard</span>
          </div>
        </div>
        <div className="flip-card" style={{ width:'100%', height:240, marginBottom:24 }} onClick={() => setFlipped(f => !f)}>
          <div className={`flip-inner ${flipped ? 'flipped' : ''}`} style={{ height:'100%' }}>
            <div className="flip-front card" style={{ position:'absolute', width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32 }}>
              <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, letterSpacing:2, textTransform:'uppercase', marginBottom:16 }}>Question — tap to flip</div>
              <p style={{ fontSize:16, color:S.text, textAlign:'center', lineHeight:1.7 }}>{card.question}</p>
            </div>
            <div className="flip-back card" style={{ position:'absolute', width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, background:'#0a1f18', borderColor:S.teal }}>
              <div style={{ fontFamily:S.mono, fontSize:10, color:S.teal, letterSpacing:2, textTransform:'uppercase', marginBottom:16 }}>Answer</div>
              <p style={{ fontSize:16, color:S.teal, textAlign:'center', lineHeight:1.7 }}>{card.answer}</p>
            </div>
          </div>
        </div>
        {flipped ? (
          <div className="fade" style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
            <button className="btn" style={{ background:'#1a3a1a', color:'#7EB8A4', border:'1px solid #2a5a2a', padding:'16px 8px' }} onClick={() => markCard('easy')}>🟢<br /><span style={{ fontSize:10, letterSpacing:1 }}>EASY</span></button>
            <button className="btn" style={{ background:'#2a1f0a', color:'#C8A96E', border:'1px solid #4a3a1a', padding:'16px 8px' }} onClick={() => markCard('iffy')}>🟡<br /><span style={{ fontSize:10, letterSpacing:1 }}>IFFY</span></button>
            <button className="btn" style={{ background:'#3a1a1a', color:'#ff8888', border:'1px solid #5a2a2a', padding:'16px 8px' }} onClick={() => markCard('hard')}>🔴<br /><span style={{ fontSize:10, letterSpacing:1 }}>HARD</span></button>
          </div>
        ) : (
          <button className="btn btn-outline" style={{ width:'100%' }} onClick={() => setFlipped(true)}>Flip Card →</button>
        )}
      </div>
    </div>
  );
}

function Vignette({ user, setPage }) {
  const [topics, setTopics] = useState([]);
  const [selectedTopic, setSelectedTopic] = useState('');
  const [mode, setMode] = useState('');
  const [timeLimit, setTimeLimit] = useState(60);
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [revealed, setRevealed] = useState({});
  const [timeLeft, setTimeLeft] = useState(0);
  const [view, setView] = useState('setup');
  const intervalRef = useRef(null);

  useEffect(() => {
    supabase.from('vignette_questions').select('topic').then(({ data }) => {
      if (data) { const unique = [...new Set(data.map(d => d.topic))]; setTopics(unique); }
    });
  }, []);

  useEffect(() => {
    if (view==='studying' && mode==='timed' && timeLeft>0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => { if (t<=1) { clearInterval(intervalRef.current); handleSubmit(); return 0; } return t-1; });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [view, mode]);

  async function startQuiz() {
    const { data } = await supabase.from('vignette_questions').select('*').eq('topic',selectedTopic).limit(40);
    if (data && data.length>0) { setQuestions(data); setCurrent(0); setAnswers({}); setRevealed({}); setSubmitted(false); if (mode==='timed') setTimeLeft(timeLimit*60); setView('studying'); }
  }

  function selectAnswer(qId, option) {
    if (submitted) return;
    setAnswers(a => ({...a,[qId]:option}));
    if (mode==='tutor') setRevealed(r => ({...r,[qId]:true}));
  }

  async function handleSubmit() {
    setSubmitted(true); clearInterval(intervalRef.current);
    const correct = questions.filter(q => answers[q.id]===q.correct_answer).length;
    await supabase.from('vignette_scores').insert({ user_id:user.id, topic:selectedTopic, score:correct, total:questions.length, mode });
    setView('results');
  }

  const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  const score = questions.filter(q => answers[q.id]===q.correct_answer).length;

  if (view==='setup') return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <style>{css}</style>
      <div className="card fade" style={{ width:'100%', maxWidth:500 }}>
        <button onClick={() => setPage('dashboard')} style={{ background:'none', border:'none', color:S.dim, cursor:'pointer', fontSize:12, fontFamily:S.mono, letterSpacing:1, marginBottom:16 }}>← Back</button>
        <span className="chapter">Question Bank</span>
        <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:26, marginBottom:24 }}>Configure Your Quiz</h2>
        <div style={{ marginBottom:20 }}>
          <label className="label">Select Topic</label>
          {topics.length===0 ? <p style={{ fontSize:14, color:S.dim }}>No questions available yet.</p> : (
            <select className="input" value={selectedTopic} onChange={e => setSelectedTopic(e.target.value)} style={{ cursor:'pointer' }}>
              <option value="">Choose a topic...</option>
              {topics.map((t,i) => <option key={i} value={t}>{t}</option>)}
            </select>
          )}
        </div>
        <div style={{ marginBottom:20 }}>
          <label className="label">Mode</label>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {[['tutor','🎓 Tutor Mode'],['timed','⏱ Timed Mode']].map(([v,l]) => (
              <button key={v} onClick={() => setMode(v)} className="btn" style={{ background:mode===v?S.gold:'transparent', color:mode===v?'#0F0E0A':S.muted, border:`1px solid ${mode===v?S.gold:S.border}` }}>{l}</button>
            ))}
          </div>
          {mode==='tutor' && <p style={{ fontFamily:S.mono, fontSize:10, color:S.dim, marginTop:8, letterSpacing:1 }}>Wrong answers shown immediately</p>}
          {mode==='timed' && <p style={{ fontFamily:S.mono, fontSize:10, color:S.dim, marginTop:8, letterSpacing:1 }}>Submit all answers at the end</p>}
        </div>
        {mode==='timed' && (
          <div style={{ marginBottom:20 }}><label className="label">Time Limit (minutes)</label><input className="input" type="number" min="1" max="180" value={timeLimit} onChange={e => setTimeLimit(parseInt(e.target.value)||60)} /></div>
        )}
        <button className="btn btn-gold" style={{ width:'100%' }} onClick={startQuiz} disabled={!selectedTopic||!mode}>Start Quiz →</button>
      </div>
    </div>
  );

  if (view==='studying') {
    const q = questions[current];
    const options = ['a','b','c','d','e'].filter(o => q[`option_${o}`]);
    return (
      <div style={{ background:S.bg, minHeight:'100vh' }}>
        <style>{css}</style>
        <nav style={{ background:'rgba(15,14,10,0.97)', borderBottom:`1px solid ${S.border}`, padding:'12px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:100 }}>
          <span style={{ fontFamily:S.mono, fontSize:11, color:S.muted, letterSpacing:1 }}>{selectedTopic} · {mode==='tutor'?'Tutor':'Timed'}</span>
          <div style={{ display:'flex', gap:16, alignItems:'center' }}>
            {mode==='timed' && <span style={{ fontFamily:S.mono, fontSize:16, color:timeLeft<60?'#ff8888':S.gold }}>{fmt(timeLeft)}</span>}
            <span style={{ fontFamily:S.mono, fontSize:11, color:S.muted }}>{current+1} / {questions.length}</span>
          </div>
        </nav>
        <div style={{ display:'grid', gridTemplateColumns:'200px 1fr', maxWidth:1000, margin:'0 auto', padding:24, gap:24 }}>
          <div>
            <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, letterSpacing:2, textTransform:'uppercase', marginBottom:12 }}>Questions</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:4 }}>
              {questions.map((q,i) => (
                <button key={i} onClick={() => setCurrent(i)} style={{ width:32, height:32, border:`1px solid ${current===i?S.gold:answers[q.id]?(answers[q.id]===q.correct_answer?S.teal:'#8B0000'):S.border}`, background:current===i?S.gold+'22':answers[q.id]?(answers[q.id]===q.correct_answer?S.teal+'22':'#8B000022'):'transparent', color:current===i?S.gold:S.muted, fontFamily:S.mono, fontSize:10, cursor:'pointer', borderRadius:2 }}>{i+1}</button>
              ))}
            </div>
            {mode==='timed' && !submitted && <button className="btn btn-gold" style={{ width:'100%', marginTop:20, fontSize:11 }} onClick={handleSubmit}>Submit All →</button>}
          </div>
          <div>
            <div className="card" style={{ marginBottom:16 }}>
              <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, letterSpacing:2, textTransform:'uppercase', marginBottom:12 }}>Question {current+1}</div>
              <p style={{ fontSize:15, color:S.text, lineHeight:1.8 }}>{q.question}</p>
            </div>
            {options.map(opt => {
              const val = q[`option_${opt}`];
              const isSelected = answers[q.id]===opt.toUpperCase();
              const isCorrect = q.correct_answer===opt.toUpperCase();
              const isRevealed = revealed[q.id]||submitted;
              let cls = 'option-btn';
              if (isRevealed && isCorrect) cls += ' correct';
              else if (isRevealed && isSelected && !isCorrect) cls += ' wrong';
              else if (isSelected) cls += ' selected';
              return <button key={opt} className={cls} onClick={() => selectAnswer(q.id, opt.toUpperCase())}><strong style={{ marginRight:12 }}>{opt.toUpperCase()}.</strong>{val}</button>;
            })}
            {(revealed[q.id]||submitted) && q.explanation && (
              <div style={{ background:'#0a1f18', border:`1px solid ${S.teal}22`, borderRadius:2, padding:16, marginTop:16 }}>
                <div style={{ fontFamily:S.mono, fontSize:10, color:S.teal, letterSpacing:2, textTransform:'uppercase', marginBottom:8 }}>Explanation</div>
                <p style={{ fontSize:14, color:S.muted, lineHeight:1.7 }}>{q.explanation}</p>
              </div>
            )}
            <div style={{ display:'flex', gap:12, marginTop:16 }}>
              {current>0 && <button className="btn btn-outline" onClick={() => setCurrent(c => c-1)}>← Prev</button>}
              {current<questions.length-1 && <button className="btn btn-gold" onClick={() => setCurrent(c => c+1)}>Next →</button>}
              {current===questions.length-1 && mode==='tutor' && <button className="btn btn-gold" onClick={handleSubmit}>See Results →</button>}
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background:S.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <style>{css}</style>
      <div className="card fade" style={{ maxWidth:500, width:'100%', textAlign:'center' }}>

}

function Admin({ setPage }) {

  const [saved, setSaved] = useState(false);
  const [uploadStatus, setUploadStatus] = useState('');
  const ADMIN_PASS = 'deofortis2024';

  useEffect(() => { if (authed) loadAll(); }, [authed]);

  async function loadAll() {
    const { data:s } = await supabase.from('admin_settings').select('*').single(); if (s) setSettings(s);
    const { data:u } = await supabase.from('profiles').select('*').order('created_at',{ascending:false}); if (u) setUsers(u);
    const { data:r } = await supabase.from('recall_requests').select('*').order('created_at',{ascending:false}); if (r) setRecallRequests(r);
    const { data:t } = await supabase.from('testimonials').select('*').order('created_at',{ascending:false}); if (t) setTestimonials(t);
    const { data:p } = await supabase.from('tutoring_packages').select('*').order('id'); if (p) setPackages(p);
    const { data:b } = await supabase.from('booking_requests').select('*').order('created_at',{ascending:false}); if (b) setBookings(b);
  }

  async function saveSettings() {
    await supabase.from('admin_settings').upsert({ id:1, ...settings });
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  }

  async function savePackages() {
    for (const pkg of packages) await supabase.from('tutoring_packages').upsert(pkg);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  }

  async function approveUser(id) {
    const exp = new Date(); exp.setMonth(exp.getMonth()+1);
    await supabase.from('profiles').update({ status:'approved', access_expires_at:exp.toISOString() }).eq('id',id);
    loadAll();
  }

  async function addTestimonial() {
    if (!newT.name||!newT.content) return;
    await supabase.from('testimonials').insert(newT);
    setNewT({ name:'', title:'', content:'' }); loadAll();
  }

  async function deleteTestimonial(id) {
    await supabase.from('testimonials').delete().eq('id',id); loadAll();
  }

  async function handleCSVUpload(e, deckName) {
    const file = e.target.files[0]; if (!file) return;
    setUploadStatus('Uploading...');
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim());
    const { data:deck } = await supabase.from('flashcard_decks').insert({ topic:deckName||file.name.replace('.csv','') }).select().single();
    if (!deck) { setUploadStatus('Error creating deck'); return; }
    const cards = lines.map(line => { const parts = line.split(','); return { deck_id:deck.id, question:parts[0]?.trim(), answer:parts.slice(1).join(',').trim() }; }).filter(c => c.question&&c.answer);
    await supabase.from('flashcards').insert(cards);
    setUploadStatus(`✓ Uploaded ${cards.length} cards!`);
    setTimeout(() => setUploadStatus(''), 3000);
  }

  async function handleTXTUpload(e, topic) {
    const file = e.target.files[0]; if (!file) return;
    setUploadStatus('Uploading...');
    const text = await file.text();
    const blocks = text.split('\n\n').filter(b => b.trim());
    const questions = [];
    for (const block of blocks) {
      const lines = block.split('\n').filter(l => l.trim());
      if (lines.length<3) continue;
      const q = { topic:topic||'General', question:'', option_a:'', option_b:'', option_c:'', option_d:'', option_e:'', correct_answer:'', explanation:'', is_global:true };
      q.question = lines[0];
      for (const line of lines.slice(1)) {
        if (line.startsWith('A.')||line.startsWith('A)')) q.option_a = line.slice(2).trim();
        else if (line.startsWith('B.')||line.startsWith('B)')) q.option_b = line.slice(2).trim();
        else if (line.startsWith('C.')||line.startsWith('C)')) q.option_c = line.slice(2).trim();
        else if (line.startsWith('D.')||line.startsWith('D)')) q.option_d = line.slice(2).trim();
        else if (line.startsWith('E.')||line.startsWith('E)')) q.option_e = line.slice(2).trim();
        else if (line.toLowerCase().startsWith('answer:')) q.correct_answer = line.split(':')[1].trim().toUpperCase();
        else if (line.toLowerCase().startsWith('explanation:')) q.explanation = line.split(':').slice(1).join(':').trim();
      }
      if (q.question&&q.correct_answer) questions.push(q);
    }
    if (questions.length>0) { await supabase.from('vignette_questions').insert(questions); setUploadStatus(`✓ Uploaded ${questions.length} questions!`); }
    else setUploadStatus('No valid questions found. Check format.');
    setTimeout(() => setUploadStatus(''), 4000);
  }

        <p style={{ fontSize:12, color:S.dim, textAlign:'center' }}><button onClick={() => setPage('landing')} style={{ background:'none', border:'none', color:S.dim, cursor:'pointer', fontSize:12 }}>← Back to site</button></p>

              <div key={i} style={{ marginBottom:24, padding:20, border:`1px solid ${S.border}`, borderRadius:4 }}>
                <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, letterSpacing:2, textTransform:'uppercase', marginBottom:12 }}>Package {i+1}</div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
                  <div><label className="label">Name</label><input className="input" value={pkg.name||''} onChange={e => { const p=[...packages]; p[i]={...p[i],name:e.target.value}; setPackages(p); }} /></div>
                  <div><label className="label">Price</label><input className="input" value={pkg.price||''} onChange={e => { const p=[...packages]; p[i]={...p[i],price:e.target.value}; setPackages(p); }} /></div>
                </div>
                <div style={{ marginBottom:12 }}><label className="label">Sessions Description</label><input className="input" value={pkg.sessions||''} onChange={e => { const p=[...packages]; p[i]={...p[i],sessions:e.target.value}; setPackages(p); }} /></div>
                <div style={{ marginBottom:12 }}><label className="label">Features (comma separated)</label><input className="input" value={pkg.features||''} onChange={e => { const p=[...packages]; p[i]={...p[i],features:e.target.value}; setPackages(p); }} /></div>
                <div><label className="label">Selar Payment Link</label><input className="input" placeholder="https://selar.co/..." value={pkg.selar_link||''} onChange={e => { const p=[...packages]; p[i]={...p[i],selar_link:e.target.value}; setPackages(p); }} /></div>
              </div>
            ))}
            <button className="btn btn-gold" onClick={savePackages}>{saved?'✓ Saved!':'Save Packages'}</button>
          </div>
        )}

        {tab==='bookings' && (
          <div className="card fade">
            <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:22, marginBottom:8 }}>Booking Requests</h2>
            <p style={{ fontSize:14, color:S.muted, marginBottom:24, fontWeight:300 }}>{bookings.filter(b => b.status==='pending').length} new bookings</p>
            {bookings.length===0 ? <p style={{ fontSize:14, color:S.dim, textAlign:'center', padding:20 }}>No bookings yet.</p> : bookings.map((b,i) => (
              <div key={i} style={{ padding:'16px 0', borderBottom:`1px solid ${S.border}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                  <div>
                    <div style={{ fontSize:15, color:S.text, marginBottom:4 }}>{b.name}</div>
                    <div style={{ fontSize:12, color:S.muted, marginBottom:4 }}>{b.email} · {b.package}</div>
                    {b.message && <p style={{ fontSize:13, color:S.dim, fontStyle:'italic' }}>{b.message}</p>}
                    <div style={{ fontFamily:S.mono, fontSize:10, color:S.dim, marginTop:4 }}>{new Date(b.created_at).toLocaleDateString()}</div>
                  </div>
                  <span style={{ fontFamily:S.mono, fontSize:10, letterSpacing:1, textTransform:'uppercase', color:b.status==='pending'?S.gold:S.teal }}>{b.status}</span>
                </div>
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
