<html lang="en" data-theme="dark">
<head>

<meta property="og:type" content="website"/>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
:root{--bg:#0F0E0A;--gold:#B8922E;--teal:#7EB8A4;--purple:#A89BC8;--text:#E8E0D0;--muted:#8A7F6E;--dim:#4A4035;--border:#2A2519;--card:#141309;--nav-bg:rgba(15,14,10,0.97);--card2:#1E1B14;--card-alt:#141309;--correct-bg:#0a1f18;--wrong-bg:#1f0a0a;--gold-subtle:rgba(184,146,46,0.08);--gold-border:rgba(184,146,46,0.2);--teal-border:rgba(126,184,164,0.13);--easy-bg:#1a3a1a;--iffy-bg:#2a1f0a;--hard-bg:#3a1a1a;}
[data-theme="light"]{--bg:#FAF9F6;--gold:#B8932E;--teal:#2A7A5E;--purple:#5B21B6;--text:#1A1814;--muted:#6B6760;--dim:#A0998E;--border:#E8E4DC;--card:#FFFFFF;--nav-bg:rgba(250,249,246,0.97);--card2:#F0EDE6;--card-alt:#F5F4F0;--correct-bg:#e6f4ef;--wrong-bg:#fdf0f0;--gold-subtle:rgba(184,147,46,0.12);--gold-border:rgba(184,147,46,0.25);--teal-border:rgba(42,122,94,0.2);--easy-bg:#e8f5ef;--iffy-bg:#fdf6e6;--hard-bg:#fdf0f0;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
[data-theme="dark"] body{background-image:url('https://raw.githubusercontent.com/ambahtamaratubor-bot/STUDY-WITH-DEO-FORTIS/main/E3677AB0-D918-4B22-A368-EB2C6F68557F.PNG');background-size:contain;background-position:bottom right;background-attachment:fixed;background-repeat:no-repeat;}
[data-theme="dark"] body::before{content:'';position:fixed;inset:0;background:rgba(14,11,8,0.94);z-index:0;pointer-events:none;}
[data-theme="dark"] #root{position:relative;z-index:1;}
@media(max-width:600px){.df-nav-links{display:none!important;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--gold);}
a{text-decoration:none;color:inherit;}
input,textarea,select{outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
.hidden{display:none!important;}
.fade{animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.btn{display:inline-block;padding:12px 28px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;letter-spacing:0.5px;cursor:pointer;border:none;border-radius:2px;transition:all .2s;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-gold{background:var(--gold);color:#0F0E0A;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-red{background:#8B0000;color:#fff;}
.btn-teal{background:var(--teal);color:#0F0E0A;}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:32px;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:12px 16px;color:var(--text);font-size:14px;transition:border-color .2s;}
.input:focus{border-color:#B8922E44;}
.input::placeholder{color:var(--dim);}
.label{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.chapter{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:12px;}
.quote{border-left:3px solid var(--gold);padding:12px 24px;font-style:italic;color:var(--muted);font-family:'Playfair Display',serif;font-size:16px;}
.page-lines{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.015;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,var(--gold) 27px,var(--gold) 28px);}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px;display:flex;align-items:center;justify-content:space-between;transition:all .3s;}
.top-nav.scrolled{background:var(--nav-bg);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.dash-nav{background:var(--nav-bg);border-bottom:1px solid var(--border);padding:16px 48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--gold);}
.nav-link{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;transition:color .2s;}
.nav-link:hover{color:var(--gold);}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:36px 28px;transition:transform .3s;position:relative;}
.plan-card:hover{transform:translateY(-6px);}
.popular-tag{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--teal);color:#0F0E0A;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:0 0 4px 4px;white-space:nowrap;}
.check-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:var(--muted);line-height:1.5;}
.reason-card{padding:24px;border:1px solid var(--card2);border-radius:4px;background:var(--card);transition:all .3s;}
.reason-card:hover{border-color:var(--gold-border);}
.leaderboard-row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--card2);}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;padding:16px 24px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.active{border-bottom-color:var(--gold);color:var(--gold);}
.option-btn{width:100%;text-align:left;padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--text);font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:10px;display:block;}
.option-btn:hover{border-color:#B8922E44;}
.option-btn.correct{border-color:var(--teal);background:var(--correct-bg);color:var(--teal);}
.option-btn.wrong{border-color:#8B0000;background:var(--wrong-bg);color:#ff8888;}
.option-btn.selected{border-color:var(--gold);background:var(--card-alt);}
.flip-card{perspective:1000px;cursor:pointer;}
.flip-inner{position:relative;width:100%;transition:transform .6s;transform-style:preserve-3d;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-front,.flip-back{backface-visibility:hidden;border-radius:4px;}
.flip-back{transform:rotateY(180deg);}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;}
.timer-ring{transition:stroke-dashoffset 1s linear;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
.option-btn.ruled-out{text-decoration:line-through;opacity:0.5;background:var(--card);border-color:var(--dim);color:var(--dim);}
.highlight-text{background:rgba(126,184,164,0.3);color:var(--teal);padding:0 2px;border-radius:2px;cursor:pointer;}
.highlight-text:hover{background:rgba(126,184,164,0.5);}
.err{background:#2a1010;border:1px solid #5a2020;border-radius:2px;padding:10px 14px;font-size:13px;color:#ff8888;margin-bottom:16px;}
.ok{background:var(--correct-bg);border:1px solid var(--teal);border-radius:2px;padding:12px 16px;font-size:13px;color:var(--teal);}
.section{padding:80px 48px;max-width:1100px;margin:0 auto;}
.inner{max-width:1000px;margin:0 auto;padding:48px 24px;}
.inner-sm{max-width:700px;margin:0 auto;padding:48px 24px;}
.inner-md{max-width:900px;margin:0 auto;padding:48px 24px;}
.divider{border-top:1px solid var(--border);}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.center{display:flex;align-items:center;justify-content:center;}
h1.big{font-family:'Playfair Display',serif;font-size:clamp(52px,9vw,110px);font-weight:700;line-height:.95;letter-spacing:-1px;}
h2.big{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,56px);font-weight:700;line-height:1.05;}
.gold-em{font-style:italic;color:var(--gold);}
.muted{color:var(--muted);font-weight:300;}
.mono{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);}
@keyframes rsvpPulse{0%,100%{box-shadow:0 0 0 0 rgba(184,146,46,0.5);}50%{box-shadow:0 0 0 10px rgba(184,146,46,0);}}
.btn-rsvp{background:var(--gold);color:#0F0E0A;animation:rsvpPulse 2s ease-in-out infinite;}
.spinner{width:40px;height:40px;border:4px solid rgba(184,146,46,0.2);border-top:4px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.df-stat-card{border-radius:12px!important;padding:14px 14px 0 14px!important;position:relative;overflow:hidden;border:1px solid rgba(201,150,58,0.4)!important;background:#100C04!important;height:140px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(0,0,0,0.8),0 8px 32px rgba(0,0,0,0.7),inset 0 1px 0 rgba(201,150,58,0.1)!important;}
.df-stat-fire{position:absolute;bottom:0;left:0;right:0;height:60px;background:radial-gradient(ellipse at 50% 110%,rgba(201,130,20,0.5) 0%,rgba(150,80,5,0.25) 42%,transparent 70%);z-index:1;pointer-events:none;}
.df-stat-bars{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;gap:2px;z-index:2;height:40px;}
.df-stat-bar{border-radius:1px 1px 0 0;flex:1;background:rgba(8,6,2,0.92);}
.df-stat-watermark{position:absolute;bottom:-16px;right:-10px;opacity:0.05;color:#C9963A;z-index:1;pointer-events:none;}
.df-stat-val{font-size:38px!important;font-weight:700!important;color:var(--text)!important;letter-spacing:-1.5px;line-height:1!important;position:relative;z-index:2;}
.df-stat-lbl{font-size:8px!important;font-weight:600!important;letter-spacing:2.5px!important;text-transform:uppercase!important;color:var(--muted)!important;margin-top:4px!important;position:relative;z-index:2;}
[data-theme="light"] .df-stat-card{background:#fff!important;border:1px solid #EDE8E0!important;box-shadow:0 10px 30px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04)!important;}
[data-theme="light"] .df-stat-fire{background:radial-gradient(ellipse at 50% 120%,rgba(201,150,58,0.12) 0%,transparent 70%);}
[data-theme="light"] .df-stat-bar{background:rgba(201,150,58,0.18);}
[data-theme="light"] .df-stat-watermark{opacity:0.05;}
.df-coll-row{background:var(--card)!important;border:1px solid rgba(255,255,255,0.04)!important;border-radius:10px!important;padding:12px 14px!important;display:flex!important;align-items:center!important;gap:12px!important;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
[data-theme="light"] .df-coll-row{border:1px solid #EDE8E0!important;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.df-coll-icon{width:30px;height:30px;border-radius:50%;background:rgba(201,150,58,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.df-sess-clk{width:26px;height:26px;border-radius:50%;border:1px solid rgba(201,150,58,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
[data-theme="light"] .df-sess-clk{border:1.5px solid #E6D3A3;}
.df-welcome-card{background:var(--card);border:1px solid var(--gold-border);border-radius:12px!important;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(201,150,58,0.06);}
[data-theme="light"] .df-welcome-card{box-shadow:0 4px 16px rgba(0,0,0,0.06);}
.df-goals-card{background:var(--card)!important;border:1px solid rgba(201,150,58,0.25)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 40px rgba(201,150,58,0.04),inset 0 1px 0 rgba(201,150,58,0.06)!important;}
[data-theme="light"] .df-goals-card{box-shadow:0 4px 16px rgba(0,0,0,0.06)!important;}
.df-ask-tutor{display:flex;align-items:center;justify-content:center;gap:7px;margin:12px auto 0;border:1.5px solid rgba(201,150,58,0.6);border-radius:50px;padding:9px 22px;background:transparent;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 0 20px rgba(201,150,58,0.12);}
[data-theme="light"] .df-ask-tutor{background:var(--gold);color:#0F0E0A;border:none;box-shadow:0 4px 16px rgba(201,150,58,0.3);}
@media(max-width:600px){
.dash-nav{padding:12px 16px;}
.top-nav{padding:12px 16px;}
.inner{padding:24px 16px;}
.inner-sm{padding:24px 16px;}
.inner-md{padding:24px 16px;}
.section{padding:48px 16px;}
.df-two-col{grid-template-columns:1fr!important;}
.df-three-col{grid-template-columns:1fr 1fr!important;}
.df-admin-layout{flex-direction:column!important;}
.df-admin-sidebar{width:100%!important;min-height:auto!important;position:relative!important;top:auto!important;border-right:none!important;border-bottom:1px solid var(--border)!important;padding:8px 16px!important;display:flex!important;flex-wrap:wrap!important;gap:4px!important;flex-direction:row!important;}
.df-nav-btns span{display:none!important;}
}
</style>
<script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');})()</script>
</head>
<body>
<div class="page-lines"></div>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
<script>
// Twemoji scoped to emoji-bitz deck content only
function parseTwemoji(el){if(el&&typeof twemoji!=='undefined')twemoji.parse(el);}
document.addEventListener('DOMContentLoaded',function(){
  var observer=new MutationObserver(function(mutations){
    mutations.forEach(function(mutation){
      mutation.addedNodes.forEach(function(node){
        if(node.nodeType===1){
          var scoped=node.querySelectorAll?node.querySelectorAll('.twemoji-scope'):[];
          for(var i=0;i<scoped.length;i++)twemoji.parse(scoped[i]);
          if(node.classList&&node.classList.contains('twemoji-scope'))twemoji.parse(node);
        }
      });
    });
  });
  observer.observe(document.getElementById('root'),{childList:true,subtree:true});
});
</script>
</body>
