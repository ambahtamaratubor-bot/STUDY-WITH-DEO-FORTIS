<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study with Deo Fortis</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="margin:0;padding:0;background:#0F0E0A;">
  <div id="root"></div>
  <div id="error-box" style="display:none;color:red;padding:20px;font-family:monospace;"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('error-box').innerText = 'Error: ' + msg + '\nLine: ' + line;
    };
  </script>
  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
